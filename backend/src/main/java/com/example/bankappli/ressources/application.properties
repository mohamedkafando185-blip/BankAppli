spring.application.name=bankappli
server.port=8080

# ── Base de données MySQL (Docker) ──────────────────────────────────────────
spring.datasource.url=jdbc:mysql://mysql:3306/bankappli?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=bankuser
spring.datasource.password=bankpass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# ── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=false
# BUG FIX #35 : désactiver open-in-view pour éviter les LazyInitializationException
spring.jpa.open-in-view=false
# BUG FIX #36 : Jackson doit ignorer les proxies Hibernate non initialisés
spring.jackson.serialization.fail-on-empty-beans=false

# ── JWT ─────────────────────────────────────────────────────────────────────
jwt.secret=bankappli-secret-key-must-be-at-least-256-bits-long-for-hs256
jwt.expiration=86400000

# ── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.example.bankappli=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
