spring.application.name=bankappli
server.port=8080

# ── Base de données MySQL (Docker) ──────────────────────────────────────────
spring.datasource.url=jdbc:mysql://mysql:3306/bankappli?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=bankuser
spring.datasource.password=bankpass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# ── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false
spring.jackson.serialization.fail-on-empty-beans=false

# ── JWT ─────────────────────────────────────────────────────────────────────
jwt.secret=bankappli-secret-key-must-be-at-least-256-bits-long-for-hs256
jwt.expiration=86400000

# ── SMTP (Gmail — remplacer par vos identifiants) ───────────────────────────
# Pour Gmail : activer "Mots de passe d'application" dans votre compte Google
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=mohamedkafando185@gmail.com
spring.mail.password=pboz jvxu gcgu bxpg
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.default-encoding=UTF-8

# ── Cache Caffeine (pour éventuels caches futurs) ────────────────────────────
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=5m

# ── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.example.bankappli=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
